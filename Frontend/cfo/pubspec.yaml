name: cfo
description: "The Scalable CFO - Financial Intelligence Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.0
  flutter_riverpod: ^2.4.9
  fl_chart: ^0.66.0
  intl: ^0.19.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  image_path: "assets/images/icon_base.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#0B1F3A"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21